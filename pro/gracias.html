<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>¡Gracias! — Auralert Pro</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; font-family: Inter, system-ui, sans-serif;
      background: radial-gradient(900px 500px at 50% 0%, rgba(99,102,241,.3), #0b1220 55%); color: #e2e8f0; padding: 24px; }
    .box { max-width: 520px; text-align: center; background: rgba(15,23,42,.85); border: 1px solid rgba(148,163,184,.2);
      border-radius: 16px; padding: 2rem; }
    h1 { margin: 0 0 .75rem; font-size: 1.75rem; }
    p { color: #94a3b8; line-height: 1.6; }
    a { display: inline-block; margin-top: 1.25rem; padding: 12px 20px; background: #6366f1; color: #fff;
      text-decoration: none; border-radius: 10px; font-weight: 600; }
    a.ghost { background: transparent; border: 1px solid rgba(148,163,184,.3); color: #e2e8f0; margin-left: 8px; }
  </style>
  <script src="api-config.example.js"></script>
</head>
<body>
  <div class="box">
    <h1>Pago recibido</h1>
    <p id="msg">Revisá tu correo: ahí está tu licencia, el link de descarga de <code>auralert-pro.min.js</code> y los pasos de instalación.</p>
    <p style="font-size:14px">Si no llega en 5 minutos, revisá spam o escribinos con el email de compra.</p>
    <a href="portal.html">Abrir portal Pro</a>
    <a class="ghost" href="../demo/">Docs gratis</a>
  </div>
  <script>
    if (new URLSearchParams(location.search).get('pending') === '1') {
      document.getElementById('msg').textContent =
        'Tu pago está pendiente de confirmación. Cuando se acredite, te enviamos la licencia por email.';
    }
  </script>
